kind = "web"
previewPath = "/"
title = "House Price Predictor"
version = "1.0.0"
id = "artifacts/house-price-predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21365

[services.development]
run = "pnpm --filter @workspace/house-price-predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/house-price-predictor", "run", "build" ]
publicDir = "artifacts/house-price-predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21365"
BASE_PATH = "/"
